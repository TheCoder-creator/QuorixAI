<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuorixAI Loading...</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,Segoe UI,sans-serif;
}

body{
    background: linear-gradient(
        135deg,
        #020617 0%,
        #06141d 40%,
        #04111a 100%
    );
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.loading-container{
    text-align:center;
    width:90%;
    max-width:400px;
}

.logo{
    margin-bottom:25px;
}

.logo-icon{
    width:80px;
    height:80px;
    background:linear-gradient(135deg,#14f1d9,#0ea5e9);
    color:#02131b;
    font-size:42px;
    font-weight:800;
    border-radius:20px;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:0 auto 15px;
    box-shadow:0 0 30px rgba(20,241,217,.35);
}

.logo-text{
    color:white;
    font-size:2rem;
    font-weight:700;
}

.logo-text span{
    color:#14f1d9;
}

.loading-text{
    color:#9ca3af;
    margin-bottom:20px;
    font-size:0.95rem;
}

.progress-container{
    width:100%;
    height:12px;
    background:rgba(255,255,255,0.08);
    border-radius:999px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,.08);
}

.progress-bar{
    height:100%;
    width:0%;
    border-radius:999px;
    background:linear-gradient(
        90deg,
        #14f1d9,
        #06b6d4,
        #0ea5e9
    );
    animation:load 3s linear forwards;
}

@keyframes load{
    from{width:0%;}
    to{width:100%;}
}

.percentage{
    color:#14f1d9;
    margin-top:12px;
    font-weight:600;
}
</style>
</head>
<body>

<div class="loading-container">

    <div class="logo">
        <!-- Replace Q with your actual QuorixAI SVG/logo -->
        <div class="logo-icon">Q</div>

        <div class="logo-text">
            Quorix<span> 1.3b</span>
        </div>
    </div>

    <div class="loading-text">
        By QuorixSoftware
    </div>

    <div class="progress-container">
        <div class="progress-bar"></div>
    </div>

    <div class="percentage" id="percent">0%</div>

</div>

<script>
let progress = 0;
const percent = document.getElementById("percent");

const timer = setInterval(() => {
    progress++;
    percent.textContent = progress + "%";

    if(progress >= 100){
        clearInterval(timer);
    }
}, 30);

// Redirect after 3 seconds
setTimeout(() => {
    window.location.href =
        "https://quorix.horizensearch.com/1.3b";
}, 3000);
</script>

</body>
</html>
