<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuorixAI</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --bg: #0a0a0f; --bg-secondary: #12121a; --card: #1a1a28; --border: #2a2a3e;
    --fg: #e8e6f0; --muted: #7a7890; --accent: #00e68a; --accent-dim: rgba(0,230,138,0.12);
    --accent-glow: rgba(0,230,138,0.25); --user-bubble: #1e2a3a; --ai-bubble: #1a1a28; --danger: #ff4466;
    --panel-bg: #0d1117; --panel-border: #1b2230; --sidebar-bg: #08080c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Space Grotesk', sans-serif; background: var(--bg); color: var(--fg); height: 100vh; overflow: hidden; }
  ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .bg-mesh { position: fixed; inset: 0; z-index: 0; pointer-events: none; background: radial-gradient(ellipse 600px 400px at 15% 20%, rgba(0,230,138,0.06) 0%, transparent 70%), radial-gradient(ellipse 500px 500px at 85% 75%, rgba(0,180,230,0.04) 0%, transparent 70%); }
  .app-layout { position: relative; z-index: 1; display: flex; height: 100vh; width: 100vw; }

  /* Sidebar & New Menu */
  .session-sidebar { position: fixed; top: 0; left: 0; width: 280px; height: 100%; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; transform: translateX(-100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); z-index: 60; }
  .session-sidebar.open { transform: translateX(0); }
  .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .sidebar-title { font-size: 14px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .sidebar-header-actions { display: flex; gap: 8px; position: relative; }
  
  .new-chat-btn { background: var(--accent); color: #000; border: none; width: 30px; height: 30px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: transform 0.2s, box-shadow 0.2s; }
  .new-chat-btn:hover { transform: scale(1.1); box-shadow: 0 0 15px var(--accent-glow); }
  
  /* New Chat Dropdown */
  .new-chat-menu { position: absolute; top: 40px; left: 0; background: var(--card); border: 1px solid var(--border); border-radius: 8px; min-width: 150px; z-index: 70; box-shadow: 0 8px 20px rgba(0,0,0,0.5); overflow: hidden; display: none; flex-direction: column; }
  .new-chat-menu.active { display: flex; }
  .new-chat-item { padding: 10px 14px; background: transparent; border: none; color: var(--fg); font-size: 13px; text-align: left; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background 0.2s; }
  .new-chat-item:hover { background: var(--accent-dim); color: var(--accent); }
  .new-chat-item i { width: 14px; text-align: center; }

  .close-sidebar-btn { background: var(--card); color: var(--muted); border: 1px solid var(--border); width: 30px; height: 30px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 13px; transition: all 0.2s; }
  .close-sidebar-btn:hover { background: var(--border); color: var(--fg); }
  .session-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 4px; }
  .session-empty { padding: 24px 12px; text-align: center; color: var(--muted); font-size: 13px; }
  .session-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; color: var(--muted); display: flex; justify-content: space-between; align-items: center; transition: all 0.2s; border: 1px solid transparent; }
  .session-item:hover { background: var(--card); color: var(--fg); }
  .session-item.active { background: var(--accent-dim); color: var(--accent); border-color: rgba(0,230,138,0.2); }
  .session-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; pointer-events: none; }
  .del-session { background: none; border: none; color: var(--danger); cursor: pointer; opacity: 0; font-size: 12px; transition: opacity 0.2s; padding: 0 4px; }
  .session-item:hover .del-session { opacity: 1; }
  
  /* Download Option in Session Item */
  .dl-session { background: none; border: none; color: #58a6ff; cursor: pointer; opacity: 0; font-size: 12px; transition: opacity 0.2s; padding: 0 4px; }
  .session-item:hover .dl-session { opacity: 1; }

  .chat-column { flex: 1; display: flex; flex-direction: column; min-width: 0; transition: margin-right 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
  .chat-column.panel-open { margin-right: 50vw; }

  .app-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid var(--border); backdrop-filter: blur(20px); background: rgba(10,10,15,0.8); flex-shrink: 0; }
  .logo-group { display: flex; align-items: center; gap: 12px; }
  .logo-icon { width: 40px; height: 40px; border-radius: 12px; background: linear-gradient(135deg, var(--accent), #00b4d8); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 18px; color: #0a0a0f; box-shadow: 0 0 20px var(--accent-glow); }
  .logo-text { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; } .logo-text span { color: var(--accent); }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .btn-icon { width: 38px; height: 38px; border-radius: 10px; background: var(--card); border: 1px solid var(--border); color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; font-size: 14px; }
  .btn-icon:hover { background: var(--border); color: var(--fg); }
  .chats-btn { display: inline-flex; align-items: center; gap: 8px; height: 38px; padding: 0 14px; border-radius: 10px; background: var(--card); border: 1px solid var(--border); color: var(--fg); cursor: pointer; transition: all 0.2s; font-family: inherit; font-size: 13px; font-weight: 600; }
  .chats-btn:hover { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }

  .dropdown { position: relative; display: inline-block; }
  .dropdown-menu { position: absolute; top: 45px; right: 0; background: var(--card); border: 1px solid var(--border); border-radius: 10px; min-width: 180px; z-index: 100; box-shadow: 0 8px 20px rgba(0,0,0,0.4); overflow: hidden; display: none; }
  .dropdown-menu.active { display: block; }
  .dropdown-item { display: flex; align-items: center; gap: 10px; width: 100%; text-align: left; padding: 12px 16px; background: none; border: none; color: var(--fg); font-family: inherit; font-size: 13px; cursor: pointer; transition: all 0.2s; }
  .dropdown-item:hover { background: var(--accent-dim); color: var(--accent); }
  .dropdown-item i { color: var(--muted); width: 16px; }
  .dropdown-item:hover i { color: var(--accent); }

  .chat-area { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
  .welcome-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 24px; padding: 40px; }
  .welcome-icon { width: 80px; height: 80px; border-radius: 24px; background: linear-gradient(135deg, var(--accent), #00b4d8); display: flex; align-items: center; justify-content: center; font-size: 36px; color: #0a0a0f; box-shadow: 0 0 40px var(--accent-glow); animation: welcomePulse 3s ease-in-out infinite; }
  @keyframes welcomePulse { 0%, 100% { box-shadow: 0 0 40px var(--accent-glow); } 50% { box-shadow: 0 0 60px var(--accent-glow), 0 0 80px rgba(0,230,138,0.1); } }
  .welcome-title { font-size: 32px; font-weight: 700; } .welcome-title span { color: var(--accent); }
  .welcome-sub { color: var(--muted); font-size: 16px; max-width: 440px; line-height: 1.6; }
  .quick-actions { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 500px; width: 100%; }
  .quick-btn { padding: 14px 16px; border-radius: 14px; background: var(--card); border: 1px solid var(--border); color: var(--fg); cursor: pointer; text-align: left; transition: all 0.25s; font-family: inherit; font-size: 13px; display: flex; align-items: center; gap: 10px; }
  .quick-btn:hover { border-color: var(--accent); background: var(--accent-dim); transform: translateY(-2px); }
  .quick-btn i { color: var(--accent); font-size: 16px; width: 20px; text-align: center; }
  .start-chat-btn { display: inline-flex; align-items: center; gap: 10px; padding: 14px 24px; border-radius: 14px; background: var(--accent); color: #0a0a0f; border: none; cursor: pointer; font-family: inherit; font-size: 15px; font-weight: 600; transition: all 0.25s; box-shadow: 0 0 24px var(--accent-glow); }
  .start-chat-btn:hover { transform: translateY(-2px); box-shadow: 0 0 36px var(--accent-glow); }
  .session-rename-input { flex: 1; background: var(--bg-secondary); border: 1px solid var(--accent); color: var(--fg); font-family: inherit; font-size: 13px; border-radius: 6px; padding: 4px 8px; outline: none; min-width: 0; }
  .edit-session { background: none; border: none; color: var(--muted); cursor: pointer; opacity: 0; font-size: 12px; transition: opacity 0.2s, color 0.2s; padding: 0 4px; }
  .session-item:hover .edit-session { opacity: 1; } .edit-session:hover { color: var(--accent); }
  .session-actions { display: flex; align-items: center; flex-shrink: 0; }

  .msg-row { display: flex; gap: 10px; animation: msgIn 0.35s ease-out; } .msg-row.user { flex-direction: row-reverse; }
  @keyframes msgIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .msg-avatar { width: 34px; height: 34px; border-radius: 10px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; margin-top: 2px; }
  .msg-row.ai .msg-avatar { background: linear-gradient(135deg, var(--accent), #00b4d8); color: #0a0a0f; }
  .msg-row.user .msg-avatar { background: #2a3a50; color: #8ab4f8; }
  .msg-content { max-width: 75%; padding: 14px 18px; border-radius: 16px; font-size: 14.5px; line-height: 1.65; }
  .msg-row.ai .msg-content { background: var(--ai-bubble); border: 1px solid var(--border); border-top-left-radius: 4px; }
  .msg-row.user .msg-content { background: var(--user-bubble); border: 1px solid rgba(138,180,248,0.15); border-top-right-radius: 4px; }
  .msg-content p { margin-bottom: 8px; } .msg-content p:last-child { margin-bottom: 0; }
  .msg-content strong { color: var(--fg); font-weight: 600; }

  .img-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; margin-top: 10px; }
  .img-grid img { width: 100%; border-radius: 10px; object-fit: cover; height: 130px; cursor: pointer; border: 1px solid var(--border); transition: transform 0.2s; }
  .img-grid img:hover { transform: scale(1.03); }

  .weather-card { background: linear-gradient(135deg, rgba(0,230,138,0.08), rgba(0,180,216,0.06)); border: 1px solid rgba(0,230,138,0.2); border-radius: 14px; padding: 18px; margin-top: 10px; }
  .weather-card .temp { font-size: 42px; font-weight: 700; color: var(--accent); }
  .weather-card .weather-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 14px; }
  .weather-card .w-val { font-size: 16px; font-weight: 600; color: var(--fg); }
  .weather-card .w-label { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .view-panel-btn { display: inline-flex; align-items: center; gap: 6px; margin-top: 10px; padding: 8px 16px; border-radius: 8px; background: rgba(88,166,255,0.1); color: #58a6ff; border: 1px solid rgba(88,166,255,0.2); cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 600; transition: all 0.2s; }
  .view-panel-btn:hover { background: rgba(88,166,255,0.2); border-color: #58a6ff; }

  /* Markdown */
  .msg-content .md-h { color: var(--fg); font-weight: 600; margin: 12px 0 6px; line-height: 1.3; }
  .msg-content .md-h:first-child { margin-top: 0; }
  .msg-content h1.md-h { font-size: 1.4em; }
  .msg-content h2.md-h { font-size: 1.25em; }
  .msg-content h3.md-h { font-size: 1.1em; }
  .msg-content h4.md-h { font-size: 1em; }
  .msg-content .md-inline-code { font-family: 'JetBrains Mono', monospace; font-size: 0.88em; background: rgba(0,230,138,0.1); color: var(--accent); padding: 1px 5px; border-radius: 4px; }
  .msg-content .md-code-block { position: relative; background: var(--panel-bg); border: 1px solid var(--panel-border); border-radius: 8px; padding: 12px 14px; margin: 10px 0; overflow-x: auto; font-family: 'JetBrains Mono', monospace; font-size: 12.5px; line-height: 1.55; color: #d6deeb; }
  .msg-content .md-code-block code { background: none; padding: 0; color: inherit; }
  .msg-content .md-code-lang { display: inline-block; position: absolute; top: 6px; right: 10px; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .msg-content .md-quote { border-left: 3px solid var(--accent); padding: 4px 0 4px 12px; margin: 8px 0; color: var(--muted); font-style: italic; }
  .msg-content .md-ul, .msg-content .md-ol { margin: 8px 0 8px 22px; }
  .msg-content .md-ul li { list-style: disc; margin-bottom: 4px; }
  .msg-content .md-ol li { list-style: decimal; margin-bottom: 4px; }
  .msg-content a { color: #58a6ff; text-decoration: underline; word-break: break-all; }

  .typing-dots { display: flex; gap: 5px; padding: 4px 0; }
  .typing-dots span { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: typeBounce 1.4s ease-in-out infinite; }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; } .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typeBounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-8px); opacity: 1; } }

  .input-area { padding: 16px 24px 24px; flex-shrink: 0; border-top: 1px solid var(--border); backdrop-filter: blur(20px); background: rgba(10,10,15,0.8); position: relative; }
  .input-wrapper { display: flex; align-items: flex-end; gap: 10px; background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 6px 6px 6px 18px; transition: border-color 0.25s, box-shadow 0.25s; }
  .input-wrapper:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
  .input-wrapper textarea { flex: 1; background: transparent; border: none; outline: none; color: var(--fg); font-family: 'Space Grotesk', sans-serif; font-size: 15px; resize: none; max-height: 120px; padding: 10px 0; line-height: 1.5; }
  .input-wrapper textarea::placeholder { color: var(--muted); }
  .send-btn { width: 42px; height: 42px; border-radius: 12px; border: none; background: linear-gradient(135deg, var(--accent), #00b4d8); color: #0a0a0f; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.25s; flex-shrink: 0; }
  .send-btn:hover { transform: scale(1.08); box-shadow: 0 0 20px var(--accent-glow); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

  .code-panel { position: fixed; top: 0; right: -50vw; width: 50vw; height: 100vh; background: var(--panel-bg); border-left: 1px solid var(--panel-border); z-index: 900; display: flex; flex-direction: column; transition: right 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
  .code-panel.open { right: 0; }
  .panel-header { padding: 16px 20px; border-bottom: 1px solid var(--panel-border); display: flex; justify-content: space-between; align-items: center; background: #161b22; flex-shrink: 0; }
  .panel-title { font-family: 'JetBrains Mono', monospace; font-size: 14px; color: #58a6ff; display: flex; align-items: center; gap: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .panel-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .panel-btn { padding: 6px 14px; border-radius: 8px; font-family: inherit; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
  .panel-btn.run { background: rgba(0,230,138,0.15); color: var(--accent); border-color: rgba(0,230,138,0.3); }
  .panel-btn.run:hover { background: rgba(0,230,138,0.25); }
  .panel-btn.copy { background: rgba(88,166,255,0.1); color: #58a6ff; border-color: rgba(88,166,255,0.2); }
  .panel-btn.copy:hover { background: rgba(88,166,255,0.2); }
  .panel-btn.close { background: transparent; color: var(--muted); }
  .panel-btn.close:hover { background: var(--border); color: var(--fg); }
  .panel-body { flex: 1; overflow-y: auto; position: relative; }
  .panel-code { padding: 20px; font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.6; color: #c9d1d9; white-space: pre; min-height: 100%; }
  .panel-preview { display: none; height: 100%; background: #fff; }
  .panel-preview.active { display: block; }
  .panel-preview iframe { width: 100%; height: 100%; border: none; }

  .toast-container { position: fixed; top: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; }
  .toast { padding: 12px 18px; border-radius: 12px; background: var(--card); border: 1px solid var(--border); color: var(--fg); font-size: 13px; box-shadow: 0 8px 30px rgba(0,0,0,0.4); animation: toastIn 0.3s ease-out; display: flex; align-items: center; gap: 8px; }
  .toast.success { border-color: var(--accent); } .toast.success i { color: var(--accent); }
  .toast.error { border-color: var(--danger); } .toast.error i { color: var(--danger); }
  @keyframes toastIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }

  .lightbox { position: fixed; inset: 0; z-index: 999; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; cursor: pointer; }
  .lightbox.active { display: flex; } .lightbox img { max-width: 90%; max-height: 85vh; border-radius: 12px; }

  .modal-overlay { position: fixed; inset: 0; z-index: 998; background: rgba(0,0,0,0.6); backdrop-filter: blur(6px); display: none; align-items: center; justify-content: center; }
  .modal-overlay.active { display: flex; }
  .modal-box { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 28px; max-width: 380px; width: 90%; text-align: center; }
  .modal-box h3 { font-size: 18px; font-weight: 600; margin-bottom: 8px; } .modal-box p { font-size: 14px; color: var(--muted); margin-bottom: 20px; }
  .modal-actions { display: flex; gap: 10px; justify-content: center; }
  .modal-actions button { padding: 10px 22px; border-radius: 10px; font-family: inherit; font-size: 14px; cursor: pointer; border: 1px solid var(--border); transition: all 0.2s; }
  .modal-cancel { background: var(--card); color: var(--fg); } .modal-cancel:hover { background: var(--border); }
  .modal-confirm { background: var(--danger); color: #fff; border-color: var(--danger); } .modal-confirm:hover { background: #ff2244; }

  .msg-time { font-size: 10px; color: var(--muted); margin-top: 6px; font-family: 'JetBrains Mono', monospace; }
  .sidebar-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 55; }
  .sidebar-backdrop.active { display: block; }

  @media (max-width: 900px) {
    .session-sidebar { width: 85%; max-width: 320px; }
    .code-panel { width: 100vw; right: -100vw; }
    .chat-column.panel-open { margin-right: 0; }
    .chats-btn span { display: none; }
    .chats-btn { padding: 0; width: 38px; justify-content: center; }
  }
</style>
</head>
<body>

<div class="bg-mesh"></div>
<div class="lightbox" id="lightbox" onclick="closeLightbox()"><img id="lightbox-img" src="" alt="Image"></div>
<div class="modal-overlay" id="confirmModal"><div class="modal-box"><h3 id="modalTitle">Clear?</h3><p id="modalMsg">Are you sure?</p><div class="modal-actions"><button class="modal-cancel" onclick="closeModal()">Cancel</button><button class="modal-confirm" id="modalConfirmBtn">Confirm</button></div></div></div>
<div class="toast-container" id="toastContainer"></div>
<div class="sidebar-backdrop" id="sidebarBackdrop" onclick="closeSidebar()"></div>

<div class="code-panel" id="codePanel">
  <div class="panel-header">
    <div class="panel-title"><i class="fas fa-code"></i> <span id="panelFileName">index.html</span></div>
    <div class="panel-actions">
      <button class="panel-btn copy" id="panelCopyBtn" onclick="copyPanelCode()"><i class="fas fa-copy"></i> Copy</button>
      <button class="panel-btn run" id="runCodeBtn" onclick="runCode()"><i class="fas fa-play"></i> Run Code</button>
      <button class="panel-btn close" onclick="closeCodePanel()"><i class="fas fa-times"></i></button>
    </div>
  </div>
  <div class="panel-body" id="panelBody">
    <div class="panel-code" id="panelCode"></div>
    <div class="panel-preview" id="panelPreview"><iframe id="previewIframe" title="Preview"></iframe></div>
  </div>
</div>

<aside class="session-sidebar" id="sessionSidebar">
  <div class="sidebar-header">
    <div class="sidebar-title">Saved Chats</div>
    <div class="sidebar-header-actions">
      <div style="position:relative;">
        <button class="new-chat-btn" onclick="toggleNewChatMenu()" title="New Chat Options"><i class="fas fa-plus"></i></button>
        <div class="new-chat-menu" id="newChatMenu">
          <button class="new-chat-item" onclick="createNewSession(); toggleNewChatMenu()"><i class="fas fa-comment"></i> New Chat</button>
          <button class="new-chat-item" onclick="triggerUpload()"><i class="fas fa-upload"></i> Upload Chat</button>
        </div>
      </div>
      <button class="close-sidebar-btn" onclick="closeSidebar()" title="Close"><i class="fas fa-times"></i></button>
    </div>
  </div>
  <div class="session-list" id="sessionList"></div>
</aside>

<div class="app-layout">

<script>
  /* ============================================
     CONFIGURATION & KEYS
     ============================================ */
  const SUPABASE_URL = 'https://eekwlctegngxdzannddi.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_YhaRLUgoEVB6iFTMJRwwEw_Bi7v-Qnq';
  const GROQ_API_KEY = "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";
  
  // Local Storage Keys
  const SESSIONS_KEY = 'quorixai_sessions';
  const ACTIVE_KEY = 'quorixai_active';
  
  // Encryption Constants (Simple client-side obfuscation/encryption)
  const ENCRYPTION_SALT = 'quorix-salt-v1'; 

  let activeModel = '1.3b';
  let sessions = {};
  let activeSessionId = null;
  let isProcessing = false;
  let modalCallback = null;
  let currentRawCode = '';
  let codeStore = {};

  /* ============================================
     CRYPTOGRAPHY FUNCTIONS (Secure Export/Import)
     ============================================ */
  
  // Convert string to buffer
  const strToBuf = (str) => new TextEncoder().encode(str);
  const bufToStr = (buf) => new TextDecoder().decode(buf);

  // Derive a key from a passphrase (for this demo, we use a fixed internal key + salt)
  // In a real app, you would ask the user for a password to encrypt the file.
  async function getCryptoKey() {
    const keyMaterial = await window.crypto.subtle.importKey(
      "raw",
      strToBuf("quorix-secure-key-123"), // Internal fixed key for convenience
      "PBKDF2",
      false,
      ["deriveKey"]
    );
    return window.crypto.subtle.deriveKey(
      {
        name: "PBKDF2",
        salt: strToBuf(ENCRYPTION_SALT),
        iterations: 100000,
        hash: "SHA-256"
      },
      keyMaterial,
      { name: "AES-GCM", length: 256 },
      false,
      ["encrypt", "decrypt"]
    );
  }

  async function encryptData(dataObj) {
    try {
      const key = await getCryptoKey();
      const iv = window.crypto.getRandomValues(new Uint8Array(12));
      const encodedData = strToBuf(JSON.stringify(dataObj));
      
      const encryptedContent = await window.crypto.subtle.encrypt(
        { name: "AES-GCM", iv: iv },
        key,
        encodedData
      );

      // Combine IV and encrypted content
      const combined = new Uint8Array(iv.length + encryptedContent.byteLength);
      combined.set(iv);
      combined.set(new Uint8Array(encryptedContent), iv.length);
      
      return combined;
    } catch (e) {
      console.error("Encryption failed", e);
      throw new Error("Failed to encrypt chat data.");
    }
  }

  async function decryptData(uint8Array) {
    try {
      const key = await getCryptoKey();
      const iv = uint8Array.slice(0, 12);
      const data = uint8Array.slice(12);

      const decryptedContent = await window.crypto.subtle.decrypt(
        { name: "AES-GCM", iv: iv },
        key,
        data
      );

      const jsonStr = bufToStr(decryptedContent);
      return JSON.parse(jsonStr);
    } catch (e) {
      console.error("Decryption failed", e);
      throw new Error("Failed to decrypt chat file. It might be corrupted.");
    }
  }

  /* ============================================
     CORE UTILITIES
     ============================================ */
  function escapeHTML(str) {
    return str.replace(/[&<>'"]/g, 
      tag => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        "'": '&#39;',
        '"': '&quot;'
      }[tag] || tag)
    );
  }

  async function showToast(message, type = 'info') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    let icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle';
    toast.innerHTML = `<i class="fas ${icon}"></i> ${message}`;
    container.appendChild(toast);
    setTimeout(() => {
      toast.style.opacity = '0';
      toast.style.transform = 'translateX(30px)';
      setTimeout(() => toast.remove(), 300);
    }, 3000);
  }

  /* ============================================
     API HANDLERS
     ============================================ */
  
  // Groq API Wrapper
  async function callGroq(prompt, systemPrompt = null) {
    const messages = [];
    if (systemPrompt) messages.push({ role: 'system', content: systemPrompt });
    messages.push({ role: 'user', content: prompt });

    const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${GROQ_API_KEY}`
      },
      body: JSON.stringify({
        model: "llama-3.3-70b-versatile",
        messages,
        temperature: 0.7
      })
    });

    if (!response.ok) throw new Error("Groq API failed");
    const data = await response.json();
    return data.choices[0].message.content;
  }

  // GitHub Fallback
  async function searchGithub(query) {
    try {
      const res = await fetch(`https://api.github.com/search/repositories?q=${encodeURIComponent(query)}&sort=stars&order=desc`);
      const data = await res.json();
      return data.items?.length ? data.items[0] : null;
    } catch (e) { return null; }
  }

  // Unified AI Handler
  async function getAIResponse(prompt, systemPrompt) {
    try {
      return await callGroq(prompt, systemPrompt);
    } catch (error) {
      console.warn("Groq failed, trying GitHub fallback...");
      const repo = await searchGithub(prompt);
      if (repo) {
        return `Found a popular GitHub project: **${repo.full_name}**\n⭐ ${repo.stargazers_count} stars\n${repo.description}\n${repo.html_url}`;
      }
      return "Groq unavailable and no GitHub results found.";
    }
  }

  /* ============================================
     APP LOGIC (Memory, UI, Chat)
     ============================================ */

  function init() {
    loadSessions();
    rebuildCodeStore();
    renderSessionList();
    setupInputListeners();
    
    // Auto-open sidebar if empty to guide user
    if (Object.keys(sessions).length === 0) {
      // Don't auto open, let user explore welcome screen
    }
  }

  // --- Memory / Session Management ---

  function loadSessions() {
    try {
      const raw = localStorage.getItem(SESSIONS_KEY);
      sessions = raw ? JSON.parse(raw) : {};
    } catch (e) {
      console.error("Session parse error", e);
      sessions = {};
    }
    
    activeSessionId = localStorage.getItem(ACTIVE_KEY);
    if (!activeSessionId || !sessions[activeSessionId]) {
      activeSessionId = null;
    }
    renderChat();
  }

  function saveSessions() {
    try {
      localStorage.setItem(SESSIONS_KEY, JSON.stringify(sessions));
      if (activeSessionId) localStorage.setItem(ACTIVE_KEY, activeSessionId);
      else localStorage.removeItem(ACTIVE_KEY);
    } catch (e) {
      showToast("Storage quota exceeded! Chat might not save fully.", "error");
    }
  }

  function createNewSession(switchTo = true) {
    const id = 'sess_' + Date.now();
    const existingCount = Object.keys(sessions).length;
    sessions[id] = { 
      name: `New Chat ${existingCount + 1}`, 
      messages: [],
      created: Date.now()
    };
    
    if (switchTo) {
      switchSession(id);
      closeSidebar();
      document.getElementById('userInput').focus();
    } else {
      saveSessions();
      renderSessionList();
    }
  }

  function switchSession(id) {
    if (!sessions[id]) return;
    activeSessionId = id;
    saveSessions();
    renderSessionList();
    renderChat();
    closeSidebar();
  }

  function deleteSession(id, e) {
    e.stopPropagation();
    delete sessions[id];
    if (activeSessionId === id) {
      activeSessionId = null;
      renderChat();
    }
    saveSessions();
    rebuildCodeStore();
    renderSessionList();
  }

  function getActiveMessages() { 
    return sessions[activeSessionId]?.messages || []; 
  }

  // --- UI Rendering ---

  function toggleSidebar() {
    const sb = document.getElementById('sessionSidebar');
    const bd = document.getElementById('sidebarBackdrop');
    const isOpen = sb.classList.contains('open');
    sb.classList.toggle('open', !isOpen);
    bd.classList.toggle('active', !isOpen);
    if (!isOpen) renderSessionList();
  }

  function closeSidebar() {
    document.getElementById('sessionSidebar').classList.remove('open');
    document.getElementById('sidebarBackdrop').classList.remove('active');
    document.getElementById('newChatMenu').classList.remove('active');
  }

  function toggleNewChatMenu() {
    document.getElementById('newChatMenu').classList.toggle('active');
  }

  // Close menus on outside click
  document.addEventListener('click', (e) => {
    const ncMenu = document.getElementById('newChatMenu');
    const ncBtn = e.target.closest('.new-chat-btn');
    if (!ncBtn && !ncMenu.contains(e.target)) {
      ncMenu.classList.remove('active');
    }

    const modelMenu = document.getElementById('modelMenu');
    const modelBtn = e.target.closest('.chats-btn'); // The model button is inside a chats-btn container or similar
    if (!modelMenu.contains(e.target) && !e.target.closest('[onclick="toggleModelMenu()"]')) {
      modelMenu.classList.remove('active');
    }
  });

  function renderSessionList() {
    const list = document.getElementById('sessionList');
    list.innerHTML = '';
    
    const sortedIds = Object.keys(sessions).sort((a, b) => {
      return (sessions[b].created || 0) - (sessions[a].created || 0);
    });

    if (sortedIds.length === 0) {
      list.innerHTML = '<div class="session-empty">No saved chats yet.</div>';
      return;
    }

    sortedIds.forEach(id => {
      const s = sessions[id];
      const isActive = id === activeSessionId;
      const div = document.createElement('div');
      div.className = `session-item ${isActive ? 'active' : ''}`;
      
      // Click to switch
      div.onclick = (e) => { 
        if (!e.target.closest('.session-actions') && !e.target.closest('.session-rename-input')) {
          switchSession(id); 
        }
      };

      div.innerHTML = `
        <span class="session-name"><i class="fas fa-message" style="margin-right:8px;font-size:11px;"></i>${escapeHTML(s.name)}</span>
        <div class="session-actions">
          <button class="dl-session" onclick="downloadChat('${id}', event)" title="Download Encrypted Chat"><i class="fas fa-download"></i></button>
          <button class="edit-session" onclick="startRename('${id}', event)" title="Rename chat"><i class="fas fa-pen"></i></button>
          <button class="del-session" onclick="deleteSession('${id}', event)" title="Delete chat"><i class="fas fa-times"></i></button>
        </div>
      `;
      list.appendChild(div);
    });
  }

  function renderChat() {
    updateInputState();
    const area = document.getElementById('chatArea');
    area.querySelectorAll('.msg-row').forEach(el => el.remove());
    
    const welcome = document.getElementById('welcomeScreen');
    const sub = document.getElementById('welcomeSub');
    const quick = document.getElementById('quickActions');
    const startBtn = document.getElementById('startChatBtn');

    if (!activeSessionId) {
      welcome.style.display = 'flex';
      sub.textContent = 'Create a new chat to start asking questions. Your conversations are saved locally.';
      quick.style.display = 'none'; 
      startBtn.style.display = 'inline-flex';
      return;
    }

    const msgs = getActiveMessages();
    if (msgs.length === 0) {
      welcome.style.display = 'flex';
      sub.textContent = `Currently using Quorix ${activeModel}. Ask me to generate code, chat, search Wikipedia, or check the weather.`;
      quick.style.display = 'grid'; 
      startBtn.style.display = 'none';
      return;
    }

    welcome.style.display = 'none';
    msgs.forEach(msg => {
      const el = createMsgElement(msg);
      area.appendChild(el);
      bindInteractiveEls(el);
    });
    scrollToBottom();
  }

  function createMsgElement(msg) {
    const row = document.createElement('div');
    row.className = `msg-row ${msg.role}`;
    
    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = msg.role === 'ai' ? 'Q' : 'U';
    
    const content = document.createElement('div');
    content.className = 'msg-content';
    content.innerHTML = msg.html;
    
    if (msg.time) {
      const t = document.createElement('div');
      t.className = 'msg-time'; 
      t.textContent = msg.time;
      content.appendChild(t);
    }
    
    row.appendChild(avatar); 
    row.appendChild(content);
    return row;
  }

  function updateInputState() {
    const input = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const hasSession = !!activeSessionId;
    
    input.disabled = !hasSession;
    sendBtn.disabled = !hasSession || isProcessing;
    input.placeholder = hasSession 
      ? `Ask Quorix ${activeModel} anything...` 
      : 'Create a new chat to start asking questions...';
  }

  function scrollToBottom() {
    requestAnimationFrame(() => {
      const area = document.getElementById('chatArea');
      area.scrollTop = area.scrollHeight;
    });
  }

  // --- Interaction & Chat Sending ---

  function setupInputListeners() {
    const input = document.getElementById('userInput');
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { 
        e.preventDefault(); 
        sendMessage(); 
      }
    });
    document.getElementById('sendBtn').addEventListener('click', sendMessage);
  }

  async function sendMessage() {
    if (isProcessing) return;
    if (!activeSessionId) {
      showToast('Create a new chat first!', 'error');
      toggleSidebar(); 
      return;
    }
    
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;

    input.value = ''; 
    input.style.height = 'auto';
    
    // Rename session if it's the first message
    const msgs = getActiveMessages();
    if (msgs.length === 0 && /^New Chat \d+$/.test(sessions[activeSessionId].name || '')) {
      sessions[activeSessionId].name = text.substring(0, 30) + (text.length > 30 ? '...' : '');
      renderSessionList();
    }

    const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const userMsg = { role: 'user', html: escapeHTML(text), time: timeStr };
    
    sessions[activeSessionId].messages.push(userMsg);
    addMessageToDOM(userMsg);
    saveSessions();

    isProcessing = true;
    updateInputState();
    showTyping();

    try {
      let result;
      // Route to correct model logic
      if (activeModel === '1.3b') {
        result = await handleQuorix1_3b(text);
      } else if (activeModel === '1.2b') {
        result = await handleQuorix1_2b(text);
      } else {
        result = await handleQuorix1_1b(text);
      }

      const aiMsg = {
        role: 'ai',
        html: result.html,
        time: timeStr,
        codeId: result.codeId || null,
        codeData: result.codeData || null
      };

      if (result.codeId && result.codeData) {
        codeStore[result.codeId] = result.codeData;
      }

      sessions[activeSessionId].messages.push(aiMsg);
      removeTyping();

      const msgEl = createMsgElement({ ...aiMsg, html: '' });
      document.getElementById('chatArea').appendChild(msgEl);
      await streamText(msgEl.querySelector('.msg-content'), result.html);
      bindInteractiveEls(msgEl);
      saveSessions();

    } catch (err) {
      removeTyping();
      const errMsg = {
        role: 'ai',
        html: `<p><strong>Error:</strong> ${escapeHTML(err.message || 'Something went wrong.')}</p>`,
        time: timeStr
      };
      sessions[activeSessionId].messages.push(errMsg);
      addMessageToDOM(errMsg);
      saveSessions();
    }

    isProcessing = false;
    updateInputState();
  }

  function addMessageToDOM(msg) {
    document.getElementById('welcomeScreen').style.display = 'none';
    const el = createMsgElement(msg);
    document.getElementById('chatArea').appendChild(el);
    bindInteractiveEls(el);
    scrollToBottom();
  }

  function showTyping() {
    const area = document.getElementById('chatArea');
    const row = document.createElement('div');
    row.className = 'msg-row ai';
    row.id = 'typingIndicator';
    row.innerHTML = `<div class="msg-avatar">Q</div><div class="msg-content"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
    area.appendChild(row);
    scrollToBottom();
  }

  function removeTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  async function streamText(container, html) {
    container.innerHTML = html; // Simple injection, could be character by character for effect
    scrollToBottom();
  }

  function bindInteractiveEls(root) {
    root.querySelectorAll('.view-panel-btn').forEach(btn => {
      btn.onclick = (e) => {
        e.stopPropagation();
        const codeId = btn.getAttribute('data-code-id');
        if (codeId) openCodePanel(codeId);
      };
    });
    root.querySelectorAll('.img-grid img').forEach(img => {
      img.onclick = () => openLightbox(img.src);
    });
  }

  function quickAction(text) {
    if (!activeSessionId) {
      createNewSession();
      setTimeout(() => {
        document.getElementById('userInput').value = text;
        sendMessage();
      }, 100);
    } else {
      document.getElementById('userInput').value = text;
      sendMessage();
    }
  }

  // --- Model Specific Logic ---

  async function handleQuorix1_3b(text) {
    const lower = text.toLowerCase();
    
    // Tools
    if (/\b(weather|temperature|forecast)\b/i.test(lower)) return await handleWeather();
    const imgMatch = lower.match(/\b(?:show|find|images?)\s+(?:of\s+)?(.+)/i);
    if (imgMatch) return await handleImages(imgMatch[1]);
    const wikiMatch = lower.match(/\b(?:tell me about|who is|what is|explain)\b\s+(.+)/i);
    if (wikiMatch) return await handleWiki(wikiMatch[1]);

    // Code
    if (/\b(code|write|make|build|create|develop)\s+(me\s+)?(.+)/i.test(lower)) {
      const match = lower.match(/\b(code|write|make|build|create|develop)\s+(me\s+)?(.+)/i);
      const request = match[3];
      return await handleGroqCode(request);
    }

    // General Chat with Markdown
    const systemPrompt = "You are Quorix 1.3b. Use Markdown for rich formatting. Be concise but thorough.";
    const answer = await getAIResponse(text, systemPrompt);
    return { html: renderMarkdown(answer) };
  }

  async function handleQuorix1_2b(text) {
    const lower = text.toLowerCase();
    if (/\b(weather|temperature|forecast)\b/i.test(lower)) return await handleWeather();
    const imgMatch = lower.match(/\b(?:show|find|images?)\s+(?:of\s+)?(.+)/i);
    if (imgMatch) return await handleImages(imgMatch[1]);
    const wikiMatch = lower.match(/\b(?:tell me about|who is|what is|explain)\b\s+(.+)/i);
    if (wikiMatch) return await handleWiki(wikiMatch[1]);
    if (/\b(code|write|make|build|create|develop)\s+(me\s+)?(.+)/i.test(lower)) {
      const match = lower.match(/\b(code|write|make|build|create|develop)\s+(me\s+)?(.+)/i);
      return await handleGroqCode(match[3]);
    }
    return await handleGroqChat(text);
  }

  async function handleQuorix1_1b(text) {
    const lower = text.toLowerCase();
    if (/\b(weather|temperature|forecast)\b/i.test(lower)) return await handleWeather();
    return { html: `<p>${escapeHTML(text)} - (Local Fallback: I can only answer basic questions in this mode.)</p>` };
  }

  // --- Tool Handlers ---

  async function handleGroqCode(query) {
    const prompt = `Write a complete HTML file for: ${query}. Return ONLY the HTML code.`;
    const code = await getAIResponse(prompt);
    const codeId = 'code_' + Date.now();
    const codeData = { content: code, name: `quorix_${Date.now()}.html` };
    codeStore[codeId] = codeData;

    return {
      html: `<p>I've generated code for <strong>${escapeHTML(query)}</strong>.</p>
             <button class="view-panel-btn" data-code-id="${codeId}"><i class="fas fa-expand"></i> View Code</button>`,
      codeId, codeData
    };
  }

  async function handleGroqChat(query) {
    const text = await getAIResponse(query);
    return { html: `<p>${escapeHTML(text)}</p>` };
  }

  async function handleWeather() {
    // Mock weather for demo
    return { 
      html: `<div class="weather-card">
              <div class="temp">72°F</div>
              <div>Sunny, San Francisco</div>
              <div class="weather-grid">
                <div><div class="w-val">45%</div><div class="w-label">Humidity</div></div>
                <div><div class="w-val">12mph</div><div class="w-label">Wind</div></div>
                <div><div class="w-val">1012</div><div class="w-label">hPa</div></div>
              </div>
             </div>` 
    };
  }

  async function handleImages(query) {
    const seed = encodeURIComponent(query);
    const images = [
      `https://picsum.photos/seed/${seed}1/400/300`,
      `https://picsum.photos/seed/${seed}2/400/300`,
      `https://picsum.photos/seed/${seed}3/400/300`,
      `https://picsum.photos/seed/${seed}4/400/300`
    ];
    let gridHtml = '<div class="img-grid">';
    images.forEach(src => gridHtml += `<img src="${src}" alt="Image" loading="lazy">`);
    gridHtml += '</div>';
    return { html: `<p>Here are some images for <strong>${escapeHTML(query)}</strong>:</p>${gridHtml}` };
  }

  async function handleWiki(query) {
    return { html: `<p>Here is what I found on Wikipedia about <strong>${escapeHTML(query)}</strong>:</p><p>Wikipedia API integration is simulated here. <em>${escapeHTML(query)}</em> is a fascinating topic often discussed in various contexts.</p>` };
  }

  function renderMarkdown(md) {
    if (!md) return '';
    let s = escapeHTML(String(md));
    s = s.replace(/```(\w+)?\n([\s\S]*?)```/g, (_, lang, code) => {
      const langLabel = lang ? `<span class="md-code-lang">${lang}</span>` : '';
      return `<pre class="md-code-block">${langLabel}<code>${code}</code></pre>`;
    });
    s = s.replace(/`([^`\n]+)`/g, '<code class="md-inline-code">$1</code>');
    s = s.replace(/^####\s+(.+)$/gm, '<h4 class="md-h">$1</h4>');
    s = s.replace(/^###\s+(.+)$/gm, '<h3 class="md-h">$1</h3>');
    s = s.replace(/^##\s+(.+)$/gm, '<h2 class="md-h">$1</h2>');
    s = s.replace(/^#\s+(.+)$/gm, '<h1 class="md-h">$1</h1>');
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    s = s.replace(/\n\n+/g, '</p><p>');
    s = `<p>${s}</p>`;
    return s;
  }

  // --- File Import / Export ---

  function triggerUpload() {
    toggleNewChatMenu();
    document.getElementById('fileUpload').click();
  }

  async function handleFileUpload(input) {
    const file = input.files[0];
    if (!file) return;
    
    showToast("Decrypting chat...", "info");
    
    try {
      const buffer = await file.arrayBuffer();
      const decryptedData = await decryptData(new Uint8Array(buffer));
      
      // Import logic
      const newId = 'sess_' + Date.now();
      sessions[newId] = {
        name: decryptedData.name || file.name.replace('.quorix', ''),
        messages: decryptedData.messages || [],
        created: decryptedData.created || Date.now()
      };
      
      saveSessions();
      renderSessionList();
      switchSession(newId);
      showToast("Chat imported successfully!", "success");
    } catch (err) {
      console.error(err);
      showToast("Failed to import chat. Invalid file.", "error");
    }
    
    input.value = ''; // Reset input
  }

  async function downloadChat(id, e) {
    e.stopPropagation();
    const session = sessions[id];
    if (!session) return;

    showToast("Encrypting chat...", "info");

    try {
      const encryptedBuffer = await encryptData(session);
      const blob = new Blob([encryptedBuffer], { type: 'application/octet-stream' });
      const url = URL.createObjectURL(blob);
      
      const a = document.createElement('a');
      a.href = url;
      a.download = `${session.name.replace(/[^a-z0-9]/gi, '_').toLowerCase()}.quorix`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      
      showToast("Chat downloaded successfully!", "success");
    } catch (err) {
      console.error(err);
      showToast("Failed to download chat.", "error");
    }
  }

  function startRename(id, e) {
    e.stopPropagation();
    const item = e.target.closest('.session-item');
    if (!item) return;
    const nameSpan = item.querySelector('.session-name');
    if (!nameSpan || item.querySelector('.session-rename-input')) return;
    
    const current = sessions[id]?.name || '';
    const input = document.createElement('input');
    input.type = 'text'; 
    input.className = 'session-rename-input'; 
    input.value = current; 
    input.maxLength = 60;
    
    nameSpan.replaceWith(input);
    input.focus(); 
    input.select();
    
    const commit = (save) => {
      if (input._done) return; 
      input._done = true;
      if (save) { 
        const val = input.value.trim(); 
        if (val) sessions[id].name = val; 
      }
      saveSessions(); 
      renderSessionList();
    };

    input.addEventListener('keydown', (ev) => {
      ev.stopPropagation();
      if (ev.key === 'Enter') { ev.preventDefault(); commit(true); }
      else if (ev.key === 'Escape') { ev.preventDefault(); commit(false); }
    });
    input.addEventListener('blur', () => commit(true));
    input.addEventListener('click', (ev) => ev.stopPropagation());
  }

  // --- Modal & Code Panel Helpers ---

  function confirmClearChat() {
    if (!activeSessionId) return;
    document.getElementById('modalTitle').textContent = "Delete Chat?";
    document.getElementById('modalMsg').textContent = "Are you sure you want to clear all messages in this chat? This cannot be undone.";
    document.getElementById('confirmModal').classList.add('active');
    modalCallback = () => {
      sessions[activeSessionId].messages = [];
      saveSessions();
      renderChat();
      showToast("Chat cleared.", "success");
    };
  }

  function closeModal() {
    document.getElementById('confirmModal').classList.remove('active');
    modalCallback = null;
  }

  document.getElementById('modalConfirmBtn').addEventListener('click', () => {
    if (modalCallback) modalCallback();
    closeModal();
  });

  function switchModel(model) {
    // In this single-file version, we just update state.
    // Real multi-model switching would require different API endpoints or logic.
    activeModel = model;
    document.getElementById('activeModelText').textContent = `Quorix ${model}`;
    document.getElementById('modelMenu').classList.remove('active');
    showToast(`Switched to Quorix ${model}`, "success");
    // Update welcome text logic
    renderChat();
  }

  function toggleModelMenu() {
    document.getElementById('modelMenu').classList.toggle('active');
  }

  function openCodePanel(codeId) {
    const data = codeStore[codeId];
    if (!data) return;
    
    const panel = document.getElementById('codePanel');
    const codeEl = document.getElementById('panelCode');
    const titleEl = document.getElementById('panelFileName');
    
    titleEl.textContent = data.name;
    codeEl.textContent = data.content;
    
    panel.classList.add('open');
    document.getElementById('chatColumn').classList.add('panel-open');
  }

  function closeCodePanel() {
    document.getElementById('codePanel').classList.remove('open');
    document.getElementById('chatColumn').classList.remove('panel-open');
    document.getElementById('panelPreview').classList.remove('active');
    document.getElementById('panelCode').style.display = 'block';
  }

  function copyPanelCode() {
    const code = document.getElementById('panelCode').textContent;
    navigator.clipboard.writeText(code).then(() => showToast("Code copied!", "success"));
  }

  function runCode() {
    const code = document.getElementById('panelCode').textContent;
    const preview = document.getElementById('panelPreview');
    const iframe = document.getElementById('previewIframe');
    
    document.getElementById('panelCode').style.display = 'none';
    preview.classList.add('active');
    
    iframe.srcdoc = code;
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
  }
  
  function openLightbox(src) {
    const lb = document.getElementById('lightbox');
    const img = document.getElementById('lightbox-img');
    img.src = src;
    lb.classList.add('active');
  }

  function rebuildCodeStore() {
    codeStore = {};
    Object.values(sessions).forEach(sess => {
      sess.messages.forEach(msg => {
        if (msg.codeData && msg.codeId) codeStore[msg.codeId] = msg.codeData;
      });
    });
  }

  // Init App
  init();

</script>
